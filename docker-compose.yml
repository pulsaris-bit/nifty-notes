services:
  db:
    image: postgres:16-alpine
    container_name: nifty-notes-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notes}
      POSTGRES_DB: ${POSTGRES_DB:-notes}
    volumes:
      - notes-db-data:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notes} -d ${POSTGRES_DB:-notes}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: nifty-notes-api:latest
    container_name: nifty-notes-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-notes}
      PGPASSWORD: ${POSTGRES_PASSWORD:-notes}
      PGDATABASE: ${POSTGRES_DB:-notes}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
      PORT: 4000
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    image: nifty-notes-web:latest
    container_name: nifty-notes-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  notes-db-data:

services:
  nifty-notes:
    build:
      context: .
      dockerfile: Dockerfile
    image: nifty-notes:latest
    container_name: nifty-notes
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
